<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Noir & Gold • Fine Dining</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Poppins', system-ui, -apple-system, sans-serif;
      background: #0d0b0a;
      color: #e7dfcc;
      line-height: 1.4;
      overflow-x: hidden;
      padding-bottom: 2rem;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 20%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.02) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .bg-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-icon {
      position: absolute;
      font-size: 2rem;
      opacity: 0.04;
      animation: floatIcon 20s infinite ease-in-out;
      color: #d4af37;
    }
    .bg-icon:nth-child(1) { top: 10%; left: 5%; font-size: 3rem; animation-delay: 0s; }
    .bg-icon:nth-child(2) { top: 25%; right: 8%; font-size: 2.5rem; animation-delay: 3s; }
    .bg-icon:nth-child(3) { top: 50%; left: 10%; font-size: 3.5rem; animation-delay: 6s; }
    .bg-icon:nth-child(4) { top: 70%; right: 5%; font-size: 2.8rem; animation-delay: 9s; }
    .bg-icon:nth-child(5) { top: 85%; left: 15%; font-size: 2.2rem; animation-delay: 12s; }
    .bg-icon:nth-child(6) { top: 15%; right: 20%; font-size: 3rem; animation-delay: 15s; }
    .bg-icon:nth-child(7) { top: 40%; left: 80%; font-size: 2.5rem; animation-delay: 18s; }
    .bg-icon:nth-child(8) { top: 60%; left: 3%; font-size: 3rem; animation-delay: 2s; }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-20px) rotate(5deg); }
      50% { transform: translateY(-10px) rotate(-3deg); }
      75% { transform: translateY(-25px) rotate(2deg); }
    }

    .main-content {
      position: relative;
      z-index: 1;
    }

    .dark-header {
      position: sticky;
      top: 0;
      background: rgba(13, 11, 10, 0.9);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 40;
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .logo-img {
      max-height: 50px;
      width: auto;
      display: block;
      filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
    }
    .header-icons {
      position: absolute;
      left: 1.2rem;
      display: flex;
      gap: 0.5rem;
      font-size: 1.2rem;
      color: #d4af37;
    }
    .call-btn-header {
      position: absolute;
      right: 1.2rem;
      background: rgba(212,175,55,0.1);
      border: 1px solid #d4af37;
      color: #d4af37;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.25s;
      font-size: 0.85rem;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .call-btn-header:hover {
      background: #d4af37;
      color: #0d0b0a;
    }

    .chef-strip {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.8rem;
      color: #bcb09b;
      background: rgba(212, 175, 55, 0.05);
      border-bottom: 1px solid rgba(212, 175, 55, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .chef-strip span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .category-bar {
      position: sticky;
      top: 62px;
      background: rgba(13, 11, 10, 0.85);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      z-index: 35;
      padding: 0.6rem 0.8rem;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
      border-bottom: 1px solid rgba(212,175,55,0.2);
    }
    .cat-pill {
      background: transparent;
      border: 1px solid #3a3327;
      color: #bcb09b;
      padding: 0.5rem 1.3rem;
      border-radius: 2.5rem;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .cat-pill.active {
      background: #d4af37;
      border-color: #d4af37;
      color: #0d0b0a;
      font-weight: 600;
      box-shadow: 0 6px 18px rgba(212,175,55,0.4);
    }

    .menu-container {
      padding: 0.3rem 0.8rem;
      max-width: 700px;
      margin: 0 auto;
    }
    .category-section {
      margin-bottom: 2rem;
      animation: fadeIn 0.4s ease;
      position: relative;
    }
    .category-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: -20px;
      width: 5px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(212, 175, 55, 0.3), transparent);
      border-radius: 5px;
    }
    .category-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: #d4af37;
      margin: 1.2rem 0 0.5rem;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .menu-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0.5rem;
      border-bottom: 1px solid #2a241c;
      transition: all 0.2s;
      gap: 0.4rem;
      border-radius: 6px;
      position: relative;
    }
    .menu-row::before {
      content: '🍽️';
      position: absolute;
      left: -25px;
      font-size: 0.6rem;
      opacity: 0;
      transition: 0.3s;
      color: #d4af37;
    }
    .menu-row:hover {
      background: rgba(212, 175, 55, 0.08);
      padding-left: 1rem;
    }
    .menu-row:hover::before {
      opacity: 0.5;
      left: -5px;
    }
    .item-name {
      flex: 2;
      font-weight: 500;
      font-size: 0.9rem;
      color: #e4d7c2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .veg-icon {
      font-size: 0.7rem;
      color: #4CAF50;
    }
    .item-price {
      font-weight: 700;
      color: #d4af37;
      font-size: 0.9rem;
      min-width: 55px;
      text-align: right;
    }
    .cart-cell {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      min-width: 75px;
      justify-content: flex-end;
    }
    .qty-btn {
      background: #2a241c;
      border: 1px solid #4a3e2c;
      color: #d4af37;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      font-size: 1rem;
    }
    .qty-btn:hover {
      background: #d4af37;
      color: #0d0b0a;
      border-color: #d4af37;
    }
    .qty-val {
      min-width: 20px;
      text-align: center;
      font-weight: 600;
    }
    .add-single {
      background: #d4af37;
      border: none;
      color: #0d0b0a;
      font-weight: 700;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 16px rgba(212,175,55,0.3);
      transition: 0.2s;
    }
    .add-single:hover {
      background: #e5c34b;
      transform: scale(1.1);
    }

    .badge {
      font-size: 0.6rem;
      background: rgba(212, 175, 55, 0.2);
      color: #d4af37;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      margin-left: 0.3rem;
    }

    .float-buttons {
      position: fixed;
      bottom: 1.5rem;
      right: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      z-index: 50;
    }
    .float-btn {
      background: rgba(20, 16, 12, 0.9);
      backdrop-filter: blur(12px);
      border: 1px solid #d4af37;
      color: #d4af37;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,0.7);
      transition: 0.25s;
      position: relative;
    }
    .float-btn:hover {
      background: #d4af37;
      color: #0d0b0a;
      transform: translateY(-3px);
    }
    .cart-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #d4af37;
      color: #0d0b0a;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-weight: 700;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cart-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 400px;
      height: 100vh;
      background: rgba(18, 14, 10, 0.97);
      backdrop-filter: blur(24px);
      box-shadow: -10px 0 40px rgba(0,0,0,0.9);
      z-index: 200;
      transition: right 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
      display: flex;
      flex-direction: column;
      padding: 1.5rem 1.2rem;
      border-left: 1px solid #d4af37;
      color: #e7dfcc;
    }
    .cart-panel.open {
      right: 0;
    }
    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
    }
    .close-cart {
      background: none;
      border: none;
      color: #d4af37;
      font-size: 2rem;
      cursor: pointer;
    }
    .cart-items {
      flex: 1;
      overflow-y: auto;
    }
    .cart-item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid #3a3327;
      gap: 0.4rem;
    }
    .cart-item-info {
      flex: 2;
      font-size: 0.85rem;
    }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .cart-item-controls .qty-btn {
      width: 28px;
      height: 28px;
      font-size: 1rem;
    }
    .table-input-area {
      margin: 1rem 0 0.8rem;
    }
    .table-input-area input {
      width: 100%;
      background: #1f1a14;
      border: 1px solid #4a3e2c;
      padding: 0.9rem 1rem;
      border-radius: 2rem;
      color: #f0e2c5;
      outline: none;
      font-size: 0.95rem;
    }
    .table-input-area input:focus {
      border-color: #d4af37;
    }
    .total-bill {
      font-weight: 700;
      font-size: 1.3rem;
      color: #d4af37;
      margin: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .wa-order-btn {
      background: #d4af37;
      border: none;
      color: #0d0b0a;
      font-weight: 700;
      padding: 0.9rem;
      border-radius: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .location-section {
      padding: 2rem 1rem;
      text-align: center;
      border-top: 1px solid rgba(212, 175, 55, 0.15);
      margin-top: 1rem;
      position: relative;
    }
    .location-section::before {
      content: '📍';
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }
    .location-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #d4af37;
      color: #0d0b0a;
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      font-weight: 600;
      text-decoration: none;
      margin-top: 0.8rem;
      transition: 0.3s;
    }
    .location-btn:hover {
      background: #e5c34b;
      box-shadow: 0 8px 24px rgba(212,175,55,0.3);
    }

    .footer-strip {
      text-align: center;
      padding: 1rem;
      color: #bcb09b;
      font-size: 0.8rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    @keyframes fadeIn {
      0% { opacity: 0.6; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .header-icons {
        font-size: 1rem;
        left: 0.8rem;
      }
      .call-btn-header {
        padding: 0.4rem 0.8rem;
        font-size: 0.75rem;
        right: 0.8rem;
      }
      .menu-row::before {
        display: none;
      }
    }
  </style>
</head>

        { id: 282, name: 'Water Bottle', price: 20, category: 'Soft Drinks', badge: '' },{ id: 283, name: 'Soft Drinks', price: 25, category: 'Soft Drinks', badge: '' },{ id: 284, name: 'Fresh Lime Soda', price: 50, category: 'Soft Drinks', badge: '' },{ id: 285, name: 'Lassi', price: 50, category: 'Soft Drinks', badge: '' },{ id: 286, name: 'Butter Milk', price: 50, category: 'Soft Drinks', badge: '' },{ id: 287, name: 'Cold Coffee', price: 100, category: 'Soft Drinks', badge: '' },
        { id: 288, name: 'Thali', price: 350, category: 'Thali', badge: '' },{ id: 289, name: 'Spl.Thali', price: 450, category: 'Thali', badge: '' },{ id: 290, name: 'Deluxe Thali', price: 500, category: 'Thali', badge: 'Premium' },
        { id: 291, name: 'Chocolate', price: 50, category: 'Ice-Cream', badge: '' },{ id: 292, name: 'Strawberry', price: 40, category: 'Ice-Cream', badge: '' },{ id: 293, name: 'Vanilla', price: 40, category: 'Ice-Cream', badge: '' },{ id: 294, name: 'Butterscotch', price: 50, category: 'Ice-Cream', badge: '' }
      ];

      const categoriesList = ['Veg Soup', 'Non-Veg Soup', 'Veg Starter', 'Non-Veg Starter', 'Sea Food Starter', 'Veg Kabab', 'Non Veg Kabab', 'Veg Main Course', 'Paneer Main Course', 'Non-Veg Main Course', 'Mutton Main Course', 'Sea Food Main Course', 'Non-Veg Biryani', 'Veg Biryani', 'Handi', 'Roti', 'Dal Menu', 'Rice & Noodles', 'Raita', 'Hot Beverages', 'Soft Drinks', 'Thali', 'Ice-Cream'];
      const catTitles = { 'Veg Soup':'🍲 Veg Soup','Non-Veg Soup':'🥣 Non-Veg Soup','Veg Starter':'🥗 Veg Starter','Non-Veg Starter':'🍗 Non-Veg Starter','Sea Food Starter':'🍤 Sea Food Starter','Veg Kabab':'🍢 Veg Kabab','Non Veg Kabab':'🍢 Non Veg Kabab','Veg Main Course':'🍛 Veg Main Course','Paneer Main Course':'🥘 Paneer Main Course','Non-Veg Main Course':'🍗 Non-Veg Main Course','Mutton Main Course':'🥩 Mutton Main Course','Sea Food Main Course':'🐟 Sea Food Main Course','Non-Veg Biryani':'🍚 Non-Veg Biryani','Veg Biryani':'🍚 Veg Biryani','Handi':'🍲 Handi','Roti':'🫓 Roti','Dal Menu':'🥣 Dal Menu','Rice & Noodles':'🍜 Rice & Noodles','Raita':'🥛 Raita','Hot Beverages':'☕ Hot Beverages','Soft Drinks':'🥤 Soft Drinks','Thali':'🍱 Thali','Ice-Cream':'🍨 Ice-Cream' };
      const catIcons = { 'Veg Soup':'🍲','Non-Veg Soup':'🥣','Veg Starter':'🥗','Non-Veg Starter':'🍗','Sea Food Starter':'🍤','Veg Kabab':'🍢','Non Veg Kabab':'🍢','Veg Main Course':'🍛','Paneer Main Course':'🥘','Non-Veg Main Course':'🍗','Mutton Main Course':'🥩','Sea Food Main Course':'🐟','Non-Veg Biryani':'🍚','Veg Biryani':'🍚','Handi':'🍲','Roti':'🫓','Dal Menu':'🥣','Rice & Noodles':'🍜','Raita':'🥛','Hot Beverages':'☕','Soft Drinks':'🥤','Thali':'🍱','Ice-Cream':'🍨' };

      let cart = {};

      function renderCategories() {
        const bar = document.getElementById('categoryBar');
        bar.innerHTML = categoriesList.map(c => `<button class="cat-pill" data-category="${c}"><span>${catIcons[c]}</span> ${catTitles[c]}</button>`).join('');
        if(bar.firstChild) bar.firstChild.classList.add('active');
      }

      function renderMenu(highlightCat = null) {
        let html = '';
        categoriesList.forEach(cat => {
          const items = menuItems.filter(i => i.category === cat);
          if(items.length === 0) return;
          html += `<div class="category-section" id="cat-${cat}"><div class="category-title"><span>${catIcons[cat]}</span> ${catTitles[cat]}</div>`;
          items.forEach(item => {
            const qty = cart[item.id] || 0;
            html += `<div class="menu-row"><span class="item-name"><span class="veg-icon">🍽️</span> ${item.name}${item.badge ? `<span class="badge">${item.badge}</span>` : ''}</span><span class="item-price">₹${item.price}</span><div class="cart-cell">`;
            if(qty > 0) {
              html += `<button class="qty-btn dec" data-id="${item.id}">−</button><span class="qty-val">${qty}</span><button class="qty-btn inc" data-id="${item.id}">+</button>`;
            } else {
              html += `<button class="add-single add-btn" data-id="${item.id}">+</button>`;
            }
            html += `</div></div>`;
          });
          html += `</div>`;
        });
        document.getElementById('menuContainer').innerHTML = html;
        attachMenuEvents();
        if(highlightCat) document.getElementById(`cat-${highlightCat}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function attachMenuEvents() {
        document.querySelectorAll('.add-btn').forEach(btn => btn.addEventListener('click', e => { let id = parseInt(e.currentTarget.dataset.id); cart[id] = (cart[id] || 0) + 1; refreshUI(); }));
        document.querySelectorAll('.dec').forEach(btn => btn.addEventListener('click', e => { let id = parseInt(e.currentTarget.dataset.id); if(cart[id] > 1) cart[id]--; else delete cart[id]; refreshUI(); }));
        document.querySelectorAll('.inc').forEach(btn => btn.addEventListener('click', e => { let id = parseInt(e.currentTarget.dataset.id); cart[id] = (cart[id] || 0) + 1; refreshUI(); }));
      }

      function refreshUI() { renderMenu(); updateBadge(); if(document.getElementById('cartPanel').classList.contains('open')) renderCart(); }

      function updateBadge() { const total = Object.values(cart).reduce((a,b) => a + b, 0); document.getElementById('cartBadge').innerText = total; }

      function renderCart() {
        const entries = Object.entries(cart);
        const container = document.getElementById('cartItemsContainer');
        if(entries.length === 0) {
          container.innerHTML = '<p style="color:#9b8e7a;text-align:center;padding:2rem;">🛒 No items selected</p>';
          document.getElementById('cartTotal').innerHTML = '<span>💰</span> ₹0';
          return;
        }
        container.innerHTML = entries.map(([id, qty]) => {
          const item = menuItems.find(i => i.id == id);
          return `<div class="cart-item-row"><span class="cart-item-info">🍽️ ${item.name}</span><div class="cart-item-controls"><button class="qty-btn cart-dec" data-id="${id}">−</button><span class="qty-val">${qty}</span><button class="qty-btn cart-inc" data-id="${id}">+</button></div><span style="font-weight:600;">₹${item.price * qty}</span></div>`;
        }).join('');
        const total = Object.entries(cart).reduce((sum, [id, qty]) => { const it = menuItems.find(i => i.id == id); return sum + (it ? it.price * qty : 0); }, 0);
        document.getElementById('cartTotal').innerHTML = `<span>💰</span> ₹${total.toLocaleString()}`;
        document.querySelectorAll('.cart-dec').forEach(btn => btn.addEventListener('click', e => { let id = parseInt(e.currentTarget.dataset.id); if(cart[id] > 1) cart[id]--; else delete cart[id]; refreshUI(); if(document.getElementById('cartPanel').classList.contains('open')) renderCart(); }));
        document.querySelectorAll('.cart-inc').forEach(btn => btn.addEventListener('click', e => { let id = parseInt(e.currentTarget.dataset.id); cart[id] = (cart[id] || 0) + 1; refreshUI(); if(document.getElementById('cartPanel').classList.contains('open')) renderCart(); }));
      }

      function openCart() { document.getElementById('cartPanel').classList.add('open'); renderCart(); }
      function closeCart() { document.getElementById('cartPanel').classList.remove('open'); }

      function placeOrder() {
        const tableNum = document.getElementById('tableNumber').value.trim();
        if(!tableNum || isNaN(tableNum) || parseInt(tableNum) < 1) { alert('⚠️ Please enter a valid Table Number.'); return; }
        if(Object.keys(cart).length === 0) { alert('⚠️ Your cart is empty.'); return; }
        let msg = "🍽️ *NOIR & GOLD - ORDER*\n\n🪑 *Table No:* " + tableNum + "\n\n📋 *Order Details:*\n";
        for(let id in cart) {
          const item = menuItems.find(i => i.id == id);
          if(item) msg += `• ${item.name} × ${cart[id]} = ₹${item.price * cart[id]}\n`;
        }
        const total = Object.entries(cart).reduce((s, [id, q]) => { const it = menuItems.find(i => i.id == id); return s + (it ? it.price * q : 0); }, 0);
        msg += `\n━━━━━━━━━━━━━━━━\n💰 *Total Amount: ₹${total}*\n\n🙏 *Thank you for your order!*`;
        window.open("https://wa.me/919284969878?text=" + encodeURIComponent(msg), '_blank');
      }

      document.getElementById('categoryBar').addEventListener('click', e => {
        const pill = e.target.closest('.cat-pill');
        if(!pill) return;
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        renderMenu(pill.dataset.category);
      });
      document.getElementById('cartFloatBtn').addEventListener('click', openCart);
      document.getElementById('closeCartBtn').addEventListener('click', closeCart);
      document.getElementById('placeOrderBtn').addEventListener('click', placeOrder);
      document.getElementById('whatsappFloat').addEventListener('click', () => window.open("https://wa.me/919284969878?text=" + encodeURIComponent("👋 Hello Noir & Gold! 🍽️"), '_blank'));
      document.getElementById('cartPanel').addEventListener('click', e => { if(e.target === document.getElementById('cartPanel')) closeCart(); });

      renderCategories();
      renderMenu();
      updateBadge();
    })();
  </script>
